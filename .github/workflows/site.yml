name: site

on:
  push:
    branches: [main]
    # Rebuild when the site sources, the contracts (DocFX scans them for XML docs),
    # the guides (DocFX pulls docs/going-live.md into the site) or this workflow change.
    paths:
      - 'site/**'
      - 'src/**'
      - 'docs/**'
      - '.github/workflows/site.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# One deploy pipeline at a time; a newer push supersedes a stale in-flight build
# (actions/deploy-pages switches atomically, so cancellation cannot half-deploy).
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up .NET (8 + 10 — global.json pins driver)
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            10.0.x
          global-json-file: global.json

      - name: Install DocFX as global tool
        run: dotnet tool install -g docfx

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: site/web/package-lock.json

      - name: Install npm dependencies
        run: npm ci
        working-directory: site/web

      - name: Build DocFX (API reference → site/api-docs/_site)
        run: |
          docfx metadata site/api-docs/docfx.json
          docfx build site/api-docs/docfx.json

      - name: Build Astro (marketing landing → site/web/dist)
        run: npm run build
        working-directory: site/web

      - name: Merge DocFX output under /docs
        run: |
          rm -rf site/web/dist/docs
          cp -r site/api-docs/_site site/web/dist/docs

      - name: Inject Umami analytics into DocFX pages
        # DocFX modern has no partial hook for arbitrary <head> scripts (only
        # _googleAnalyticsTagId is built-in). Forking _master.tmpl would drift
        # on every DocFX upgrade; sed survives upgrades as long as </head>
        # exists. Mirrors site/preview.sh.
        run: |
          UMAMI_TAG='<script defer src="https://analytics.quaterio.com/script.js" data-website-id="a4075622-7115-4bb5-bc15-17b62a02408e"></script>'
          find site/web/dist/docs -name "*.html" -type f -exec \
            sed -i "s|</head>|${UMAMI_TAG}</head>|" {} +

      - name: Configure Pages (auto-enable if not already)
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
