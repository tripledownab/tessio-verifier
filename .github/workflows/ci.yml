name: ci

on:
  push:
    branches: [main]
    # No tag trigger: release.yml builds and tests independently on tags.
    # Docs, site and repo-meta changes don't affect the build; skip CI for them.
    paths-ignore:
      - 'docs/**'
      - 'site/**'
      - '**/*.md'
      - '.github/dependabot.yml'
  pull_request:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - 'site/**'
      - '**/*.md'
      - '.github/dependabot.yml'
  # Windows coverage matters (most consuming .NET shops run Windows; X.509 SAN formatting is
  # platform-dependent) but Windows minutes are billed at 2x and show up on the org meter, so the
  # Windows leg runs weekly and on demand instead of on every push.
  schedule:
    - cron: '0 5 * * 1'
  workflow_dispatch:

# Rapid consecutive pushes supersede each other; cancel the stale run.
concurrency:
  group: ci-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: true

jobs:
  build-test-pack:
    strategy:
      fail-fast: false
      matrix:
        os: ${{ (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch') && fromJSON('["ubuntu-latest", "windows-latest"]') || fromJSON('["ubuntu-latest"]') }}
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET (8 + 9 — global.json drives the SDK pin)
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x
          global-json-file: global.json

      - name: Restore
        run: dotnet restore Tessio.Verifier.sln

      - name: Build
        run: dotnet build Tessio.Verifier.sln --no-restore --configuration Release

      - name: Test
        run: dotnet test Tessio.Verifier.sln --no-build --configuration Release --logger "trx;LogFileName=test-results.trx"

      - name: Pack
        run: dotnet pack Tessio.Verifier.sln --no-build --configuration Release --output ./artifacts

      - name: Upload packages
        if: success() && matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: nupkgs
          path: artifacts/*.nupkg
          retention-days: 7

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.os }}
          path: '**/TestResults/*.trx'
          retention-days: 7
