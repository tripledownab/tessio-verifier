name: ci

on:
  push:
    branches: [main]
    # No tag trigger: release.yml builds and tests independently on tags, and paths filtering
    # has murky semantics for tag pushes.
    # Docs, site and repo-meta changes don't affect the build; skip the two-OS matrix for them.
    paths-ignore:
      - 'docs/**'
      - 'site/**'
      - '**/*.md'
      - '.github/dependabot.yml'
  pull_request:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - 'site/**'
      - '**/*.md'
      - '.github/dependabot.yml'

# Rapid consecutive pushes supersede each other; cancel the stale run. Tag builds never cancel.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/') }}

jobs:
  build-test-pack:
    strategy:
      fail-fast: false
      matrix:
        # Windows coverage matters: most consuming .NET shops run Windows, and the
        # X.509 SAN handling in Core has platform-dependent formatting.
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET (8 + 9 — global.json drives the SDK pin)
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x
          global-json-file: global.json

      - name: Restore
        run: dotnet restore Tessio.Verifier.sln

      - name: Build
        run: dotnet build Tessio.Verifier.sln --no-restore --configuration Release

      - name: Test
        run: dotnet test Tessio.Verifier.sln --no-build --configuration Release --logger "trx;LogFileName=test-results.trx"

      - name: Pack
        run: dotnet pack Tessio.Verifier.sln --no-build --configuration Release --output ./artifacts

      - name: Upload packages
        if: success() && matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: nupkgs
          path: artifacts/*.nupkg

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.os }}
          path: '**/TestResults/*.trx'
