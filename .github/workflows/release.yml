name: release

on:
  push:
    tags: ['v*']
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # OIDC token issuance for NuGet Trusted Publishing
    env:
      NUGET_USER: ${{ secrets.NUGET_USER }}
      NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
    steps:
      - uses: actions/checkout@v7

      - name: Set up .NET (8 + 10)
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            10.0.x
          global-json-file: global.json

      - name: Restore
        run: dotnet restore Tessio.Verifier.sln

      - name: Build
        run: dotnet build Tessio.Verifier.sln --no-restore --configuration Release

      - name: Test
        run: dotnet test Tessio.Verifier.sln --no-build --configuration Release

      - name: Pack
        run: dotnet pack Tessio.Verifier.sln --no-build --configuration Release --output ./release-artifacts

      - name: Upload packages
        uses: actions/upload-artifact@v4
        with:
          name: release-nupkgs
          path: release-artifacts/*.*nupkg

      # Preferred path: Trusted Publishing (OIDC -> 1-hour API key, no long-lived secret).
      # Requires a nuget.org trusted publishing policy for this repo + workflow, and the
      # NUGET_USER secret set to the nuget.org profile that owns the policy.
      - name: NuGet login (OIDC → temp API key)
        if: env.NUGET_USER != ''
        id: login
        uses: NuGet/login@v1
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Push to NuGet (trusted publishing)
        if: env.NUGET_USER != ''
        run: >
          dotnet nuget push "release-artifacts/*.nupkg"
          --api-key "${{ steps.login.outputs.NUGET_API_KEY }}"
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate

      # Fallback path: classic long-lived API key, used only when no NUGET_USER is configured.
      - name: Push to NuGet (API key fallback)
        if: env.NUGET_USER == '' && env.NUGET_API_KEY != ''
        run: >
          dotnet nuget push "release-artifacts/*.nupkg"
          --api-key "$NUGET_API_KEY"
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate

      - name: NuGet publish skipped
        if: env.NUGET_USER == '' && env.NUGET_API_KEY == ''
        run: echo "::warning::Neither NUGET_USER (trusted publishing) nor NUGET_API_KEY is configured; packages were built but not published."
